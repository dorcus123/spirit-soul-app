workflows:
  ios-workflow:
    name: Spirit & Soul iOS
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.spiritsoul.app
      xcode: latest
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Sync Capacitor
        script: |
          cp index.html .dist/index.html
          cp app.js .dist/app.js
          cp styles.css .dist/styles.css
          npx cap sync ios
          cd ios/App && pod install && cd ../..
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
